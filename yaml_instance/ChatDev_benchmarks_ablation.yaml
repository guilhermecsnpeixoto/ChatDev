graph:
  id: ChatDev_benchmark_ablation
  description: >
    Ablation study — no Client Liaison or User Simulator.
    CEO receives the initial prompt directly without any clarification phase.
    Switch benchmarks by changing BENCHMARK_SPEC to one of:
      - benchmark_task_api
      - benchmark_csv_pipeline
      - benchmark_chat_server
      - benchmark_url_shortener
      - benchmark_expense_tracker
  log_level: DEBUG
  is_majority_voting: false

  nodes:
    - id: Chief Executive Officer
      type: agent
      description: Converts requirements into project vision, high-level design, and functional requirements.
      context_window: -1
      config:
        name: google/gemini-3.1-flash-lite-preview
        provider: openrouter
        role: |-
          ${COMMON_PROMPT}
          Tooling guidance: Minimize external tool calls—batch `describe_available_files` and `read_file_segment`, read only required files, cache results, and avoid repeated runs unless necessary.
          Language constraint: All development, examples, and implementation details must be provided in Python.
          You are the Chief Executive Officer.
          You are part of a collaborative team where each member has a specific role.

          Your responsibilities (preserve-and-expand policy):
          1) Echo the Original Requirements verbatim under the header `Original Requirements:`.
          2) Produce a Requirements Summary using the exact Client Liaison format:
             Requirements Summary:
             - [requirement 1]
             - [requirement 2]
             <INFO> Requirements are clear. Proceeding to development.
          3) Provide Implementation Addenda: a numbered list of concrete implementation details,
             clarifications, algorithmic suggestions, interfaces, and measurable parameters that
             expand on the original requirements. ONLY add information — do NOT change, remove,
             or replace any Original Requirements.
          4) Be concise and technical; include pseudo-code or parameter recommendations in the
             Addenda when helpful for the Programmer.
          5) End your message with the exact token `<INFO> Finished` when your addenda are complete.

          Critical constraints:
          - DO NOT propose or output any changes to the user's functional requirements.
          - DO NOT emit any `Proposed Changes` section or ask for approval.
          - Your output must include the exact headers/tokens: `Original Requirements:`,
            `Requirements Summary:`, `Implementation Addenda:`, and `<INFO> Finished`.
        base_url: ${BASE_URL}
        api_key: ${API_KEY}
        params: {}
        tooling:
          - type: function
            config:
              tools:
                - name: describe_available_files
                - name: read_file_segment
                - name: search_in_files
                - name: list_directory
              timeout: null
        thinking: null
        memories: []
        retry: null

    - id: Chief Technology Officer
      type: agent
      description: Defines architecture, tech stack, and file structure from CEO plan.
      context_window: -1
      config:
        name: google/gemini-3.1-flash-lite-preview
        provider: openrouter
        role: |-
          ${COMMON_PROMPT}
          Tooling guidance: Minimize external tool calls—batch `describe_available_files` and `read_file_segment`, read only required files, cache results, and avoid repeated runs unless necessary.
          Language constraint: All development, examples, and implementation details must be provided in Python.
          You are the Chief Technology Officer.
          You are part of a collaborative team where each member has a specific role.

          Your responsibilities (preserve-and-expand policy):
          1) Receive the structured output from the CEO and include the `Original Requirements:` block verbatim.
          2) Reproduce the `Requirements Summary:` exactly as provided by the CEO without altering it.
          3) Provide `Implementation Addenda` that expand with architecture, APIs, data structures,
             algorithms, performance targets, and measurable parameters. ONLY add — do NOT change or remove.
          4) Translate addenda to concrete module responsibilities, interfaces, and pseudocode for
             critical algorithms where applicable.
          5) End your message with the exact token `<INFO> Finished`.

          Critical constraints:
          - DO NOT alter the user's functional requirements or the CEO's Requirements Summary.
          - DO NOT output any `Proposed Changes` or request approval.
          - Your output must contain: `Original Requirements:`, `Requirements Summary:`,
            `Implementation Addenda:`, and `<INFO> Finished`.
        base_url: ${BASE_URL}
        api_key: ${API_KEY}
        params: {}
        tooling:
          - type: function
            config:
              tools:
                - name: describe_available_files
                - name: read_file_segment
                - name: search_in_files
                - name: list_directory
              timeout: null
        thinking: null
        memories: []
        retry: null

    - id: Programmer
      type: agent
      description: Implements code per CTO specs with communicative dehallucination protocol.
      context_window: -1
      config:
        name: google/gemini-3.1-flash-lite-preview
        provider: openrouter
        role: |-
          ${COMMON_PROMPT}
          Tooling guidance: Minimize external tool calls—batch `describe_available_files` and `read_file_segment`, read only required files, cache results, and avoid repeated runs unless necessary.
          Language constraint: All development, examples, and implementation details must be provided in Python.
          You are the Programmer.
          You are part of a collaborative team where each member has a specific role.

          Your responsibilities:
          1) Implement code based on CTO technical specifications and architecture.
          2) Create files, folders, and project structure as specified by the CTO.
          3) Resolve defects reported by the Code Reviewer (follow the communicative dehallucination protocol below).
          4) Fix test failures reported by the Tester.
          5) Save all file changes using available functions.
          6) Ensure all code is complete, functional, and executable (no placeholders such as pass).

          Communicative dehallucination protocol (MANDATORY when receiving a review comment):
          STEP 1 — Clarify before acting:
            Before writing or changing any code, ask the Code Reviewer one or more targeted
            clarifying questions. Do NOT guess. Do NOT assume. Do NOT start coding yet.
          STEP 2 — Act once clarified:
            Only after receiving specific answers should you load source code, apply the fix,
            save changes, and include "<INFO> Finished".

          Output rules:
          - If asking clarifying questions (Step 1): write ONLY your questions. No code changes.
          - If applying a fix (Step 2): describe what you changed and include "<INFO> Finished".
          - If all work is complete: include "<INFO> Finished".
        base_url: ${BASE_URL}
        api_key: ${API_KEY}
        params: {}
        tooling:
          - type: function
            config:
              tools:
                - name: uv_related:All
                - name: apply_text_edits
                - name: create_folder
                - name: describe_available_files
                - name: delete_path
                - name: read_file_segment
                - name: search_in_files
                - name: save_file
                - name: list_directory
              timeout: null
        thinking: null
        memories: []
        retry: null

    - id: Code Reviewer
      type: agent
      description: Reviews implementation and answers Programmer clarifying questions with specific details.
      context_window: -1
      config:
        name: google/gemini-3.1-flash-lite-preview
        provider: openrouter
        role: |-
          ${COMMON_PROMPT}
          Tooling guidance: Call `describe_available_files` once per review phase then `read_file_segment`
          only for files you will inspect; cache results and avoid unnecessary repeat calls.
          Language constraint: All development, examples, and implementation details must be provided in Python.
          You are the Code Reviewer.
          You are part of a collaborative team where each member has a specific role.

          IMPORTANT: You MUST call `describe_available_files` yourself and then `read_file_segment`
          to load the actual source code before doing any review. If you cannot find any files,
          output "<INFO> Finished".

          Your responsibilities:
          1) Call `describe_available_files` (once) to list files and decide which to inspect.
          2) Call `read_file_segment` only for files you will review; batch reads and cache results.
          3) Review code against specifications, identifying:
             - infinite loops or deadlocks
             - unimplemented or incomplete methods/functions
             - logic bugs and potential runtime errors
             - missing imports or unresolved references
             - reliability and robustness concerns
          4) Provide clear, specific, actionable feedback.

          Communicative dehallucination protocol (MANDATORY):
          The Programmer will ask clarifying questions before acting. Answer with concrete,
          unambiguous details. Vague answers cause coding hallucinations.
          After answering, end with "<INFO> Problem Found" to keep the fix loop active.

          Output rules:
          - If reporting a new problem: numbered list with suggested fixes; end with "<INFO> Problem Found".
          - If answering Programmer's questions: specific answers; end with "<INFO> Problem Found".
          - If no relevant problems remain: output exactly "<INFO> Finished".
        base_url: ${BASE_URL}
        api_key: ${API_KEY}
        params: {}
        tooling:
          - type: function
            config:
              tools:
                - name: describe_available_files
                - name: read_file_segment
                - name: search_in_files
                - name: list_directory
              timeout: null
        thinking: null
        memories: []
        retry: null

    - id: Tester
      type: agent
      description: Creates and runs tests; reports failures or completion.
      context_window: -1
      config:
        name: google/gemini-3.1-flash-lite-preview
        provider: openrouter
        role: |-
          ${COMMON_PROMPT}
          Tooling guidance: Infer structure from a single `describe_available_files` call and batch
          `read_file_segment` calls; prefer lightweight import/compile checks before heavier runs.
          Language constraint: All development, examples, and implementation details must be provided in Python.
          You are the Tester.
          You are part of a collaborative team where each member has a specific role.

          IMPORTANT: You MUST call describe_available_files and read_file_segment to load
          the actual source code before testing. If you cannot find any files, output "<INFO> Finished".

          Primary responsibilities (priority order):
          1) Verify the project builds/installs dependencies and compiles (or can be imported).
          2) Attempt minimal smoke runs of the project's entrypoints with short timeouts.
          3) Run the existing test suite if present; otherwise run lightweight compile/import and smoke tests.
          4) Collect and report stdout, stderr, exit codes, and startup logs.
          5) If tests or runs fail, identify failing cases and provide reproduction steps and likely root causes.

          Timeout guidance:
          - Always pass `timeout_seconds` to `uv_run`; use a short timeout for smoke runs of servers, GUIs, games, or any program expected to keep running.
          - If a program times out but shows clear startup logs, treat it as successful startup.
          - Only classify a timeout as a bug if the program was supposed to complete quickly
            or produced no useful output before timing out.

          uv_run usage: always provide either `module` (e.g. "pytest") or `script` (e.g. "main.py"). Never call uv_run without one of these two parameters.

          Output rules:
          - If problems exist: short bullet list (1-4 items) with explanation; end with "<INFO> Problem Found".
          - If nothing more to test or no problems: output "<INFO> Finished" followed by a 2-4 bullet summary.
        base_url: ${BASE_URL}
        api_key: ${API_KEY}
        params: {}
        tooling:
          - type: function
            config:
              tools:
                - name: uv_related:All
                - name: apply_text_edits
                - name: create_folder
                - name: describe_available_files
                - name: delete_path
                - name: read_file_segment
                - name: search_in_files
                - name: save_file
                - name: list_directory
              timeout: null
        thinking: null
        memories: []
        retry: null

    - id: FINAL
      type: passthrough
      description: Terminal node when testing confirms completion.
      context_window: 0
      config: {}

    - id: Review Loop Counter
      type: loop_counter
      config:
        max_iterations: 3
        reset_on_emit: true
        message: ''
      description: ''
      context_window: 0
      log_output: true

    - id: Test Loop Counter
      type: loop_counter
      config:
        max_iterations: 3
        reset_on_emit: true
        message: ''
      description: ''
      context_window: 0
      log_output: true

  edges:
    - from: Chief Executive Officer
      to: Chief Technology Officer
      trigger: true
      condition: 'true'
      carry_data: true
      keep_message: false

    - from: Chief Technology Officer
      to: Programmer
      trigger: true
      condition: 'true'
      carry_data: true
      keep_message: false

    - from: Programmer
      to: Code Reviewer
      trigger: true
      condition: 'true'
      carry_data: true
      keep_message: false

    - from: Code Reviewer
      to: Programmer
      trigger: true
      condition:
        type: keyword
        config:
          any:
            - <INFO> Problem Found
          none: []
          regex: []
          case_sensitive: true
      carry_data: true
      keep_message: false

    - from: Code Reviewer
      to: Review Loop Counter
      trigger: true
      condition:
        type: keyword
        config:
          any: []
          none:
            - <INFO> Finished
          regex: []
          case_sensitive: true
      carry_data: true
      keep_message: false

    - from: Review Loop Counter
      to: Tester
      trigger: true
      condition:
        type: function
        config:
          name: 'true'
      carry_data: true
      keep_message: false

    - from: Code Reviewer
      to: Tester
      trigger: true
      condition:
        type: keyword
        config:
          any:
            - <INFO> Finished
          none: []
          regex: []
          case_sensitive: true
      carry_data: true
      keep_message: false

    - from: Tester
      to: Programmer
      trigger: true
      condition:
        type: keyword
        config:
          any: []
          none:
            - <INFO> Finished
          regex: []
          case_sensitive: true
      carry_data: true
      keep_message: false

    - from: Tester
      to: Test Loop Counter
      trigger: true
      condition:
        type: keyword
        config:
          any: []
          none:
            - <INFO> Finished
          regex: []
          case_sensitive: true
      carry_data: true
      keep_message: false

    - from: Test Loop Counter
      to: FINAL
      trigger: true
      condition:
        type: function
        config:
          name: 'true'
      carry_data: true
      keep_message: false

    - from: Tester
      to: FINAL
      trigger: true
      condition:
        type: keyword
        config:
          any:
            - <INFO> Finished
          none: []
          regex: []
          case_sensitive: true
      carry_data: true
      keep_message: false

  memory: []
  initial_instruction: ''
  start:
    - Chief Executive Officer
  end:
    - FINAL

vars:
  COMMON_PROMPT: >
    ChatDev is a software company powered by multiple intelligent agents, such as chief executive
    officer, chief human resources officer, chief product officer, chief technology officer, etc,
    with a multi-agent organizational structure and the mission of "changing the digital world
    through programming".

  BENCHMARK_SPEC: ${benchmark_task_api}

  benchmark_task_api: "Task Management REST API"
  benchmark_csv_pipeline: "CSV Processing Pipeline"
  benchmark_chat_server: "Real-Time Chat Server"
  benchmark_url_shortener: "URL Shortener Service"
  benchmark_expense_tracker: "Expense Tracker CLI"