  #   AC2: Add expense command works (add --amount 50 --currency EUR --category food exits 0)
  #   AC3: List command shows added expense (list output contains added entry)
  #   AC4: Currency conversion applied (EUR expense listed in GBP base differs by exchange rate)
  #   AC5: Recurring expense re-appears after DB entry removed for current month
  #   AC6: Monthly report by category produced (report --month YYYY-MM groups by category)
  #   AC7: CSV export produced (export --output expenses.csv; valid CSV file created)
  #   AC8: Data persists between runs (add expense; restart process; list shows same entry)
  #   AC9: SQLite database file created after first run
  # llm_judge_criteria:
  #   LJ1 [high]:   Currency conversion consistent — all amounts in base currency OR converted at display, never mixed
  #   LJ2 [high]:   Recurring logic correct — generates exactly once per month, no duplicates on re-run
  #   LJ3 [high]:   Monthly report correctly aggregates by category and month — no off-by-one on boundaries
  #   LJ4 [medium]: CLI intuitive — commands discoverable via --help; error messages clear
  #   LJ5 [medium]: CSV export includes all fields: date, amount, currency, converted_amount, category, description
  # scoring: auto_checks 60% / llm_judge 40%
  # pass condition: AC1+AC2+AC3+AC8 (basic CRUD + persistence). AC4+AC5 are discriminating. All LJ high must pass.
  benchmark_expense_tracker: |-
    Project: Expense Tracker

    Product requirements (the client knows these well):
    - Users can add, edit, and delete expense entries.
    - Each expense must have a category (e.g. food, transport, utilities).
    - Expenses can be in different currencies; the app converts them to a base currency.
    - Some expenses repeat monthly (e.g. rent, subscriptions) — these should be entered once.
