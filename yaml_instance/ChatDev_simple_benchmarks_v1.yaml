graph:
  id: ChatDev_benchmark_simulator
  description: >
    ChatDev pipeline with User Simulator replacing Human Input.
    Switch benchmarks by changing BENCHMARK_SPEC to one of:
      - benchmark_task_api
      - benchmark_csv_pipeline
      - benchmark_chat_server
    The User Simulator receives the hidden spec for the selected benchmark
    and responds to Client Liaison clarification questions as a realistic,
    non-technical client (normal cooperativeness: short, direct answers,
    no volunteering of extra information).
  log_level: DEBUG
  is_majority_voting: false

  nodes:
    - id: Client Liaison
      type: agent
      description: Evaluates user requirements and asks clarification questions before passing to CEO.
      context_window: -1
      config:
        name: google/gemini-3.1-flash-lite-preview
        provider: openrouter
        role: |-
          ${COMMON_PROMPT}
          Tooling guidance: Minimize external tool calls—batch `describe_available_files` and `read_file_segment`, read only required files, cache results, and avoid repeated runs unless necessary. When using `uv_run` for smoke tests or server-like programs, always pass `timeout_seconds`; do not wait for natural termination when the program is expected to keep running.
          Language constraint: All development, examples, and implementation details must be provided in Python.
          You are Client Liaison.
          You are part of a collaborative team where each member has a specific role.

          Your responsibilities:
          1) Receive the initial user request and evaluate the clarity and completeness of the requirements.
          2) Produce ONE set of clarification questions to surface any ambiguous, incomplete, or contradictory requirements.
             - Ask ALL your questions in a single message. You may NOT ask more than one set.
             - Focus on questions that change architecture: persistence, auth, deployment, error handling, scale.
          3) The moment you receive ANY response from the User Simulator, you MUST stop asking questions
             and immediately output the Requirements Summary in this exact format:
               Requirements Summary:
               - [requirement 1]
               - [requirement 2]
               - [requirement 3]
               <INFO> Requirements are clear. Proceeding to development.
          4) Pass the Requirements Summary to the Chief Executive Officer.

          Critical constraints:
          - You DO NOT write code.
          - You DO NOT create files or folders.
          - You DO NOT run commands or call execution tools.
          - You DO NOT ask more than 1 set of questions.
          - NEVER include "<INFO>" in the same message as your questions.
          - After the User Simulator responds, you MUST immediately output the Requirements Summary. No exceptions.
        base_url: ${BASE_URL}
        api_key: ${API_KEY}
        params: {}
        tooling: []
        thinking: null
        memories: []
        retry: null

    - id: User Simulator
      type: agent
      description: >
        Simulates a realistic non-technical client. Holds the hidden spec for the
        selected benchmark and answers CL questions naturally, without volunteering
        extra information. Normal cooperativeness: short, direct, no extras.
      context_window: -1
      config:
        name: google/gemini-3.1-flash-lite-preview
        provider: openrouter
        role: |-
          You are simulating a human client who has requested a software project.

          You hold a hidden project specification that defines the real requirements.
          Your job is to answer clarification questions from the Client Liaison naturally
          and consistently, as a real (non-technical) client would.

          COOPERATIVENESS LEVEL: Normal
          - Answers are short and direct.
          - You respond only to what was asked. Never volunteer extra requirements.
          - You do not explain implementation details unless explicitly asked.
          - If the specification does not cover something, say "I don't have a strong preference"
            or "whatever is standard" — do not invent new requirements.
          - If a question is highly technical and a real client would not know the answer,
            respond as a non-expert: "I'm not sure, whatever works best."
          - Maintain full consistency across the conversation. Never contradict yourself.
          - Temperature should be low: deterministic, stable answers.

          RULES (strictly enforced):
          1. ONLY answer the question(s) that were asked.
          2. NEVER reveal unrelated parts of the hidden spec proactively.
          3. NEVER invent requirements not in the hidden spec.
          4. Keep answers concise — 1 to 2 sentences maximum per question.
          5. Do NOT dump the entire spec at once.
          6. Do NOT suggest frameworks, libraries, or implementation approaches
             unless the spec explicitly names them AND the CL asked about that topic.
          7. Do NOT act like an AI assistant. Behave like a realistic stakeholder.
          8. After answering, output exactly: <INFO> Answered
             This signals the Client Liaison to proceed to the Requirements Summary.

          HIDDEN SPECIFICATION FOR THIS BENCHMARK:
          ${BENCHMARK_SPEC}

          Answer based solely on this specification. If something is not defined here,
          express no preference. Do not make up requirements outside this spec.
        base_url: ${BASE_URL}
        api_key: ${API_KEY}
        params: {}
        tooling: []
        thinking: null
        memories: []
        retry: null

    - id: USER
      type: passthrough
      description: Receives the enriched Requirements Summary from Client Liaison.
      context_window: 0
      config: {}

    - id: Chief Executive Officer
      type: agent
      description: Converts requirements into project vision, high-level design, and functional requirements.
      context_window: -1
      config:
        name: google/gemini-3.1-flash-lite-preview
        provider: openrouter
        role: |-
          ${COMMON_PROMPT}
          Tooling guidance: Minimize external tool calls—batch `describe_available_files` and `read_file_segment`, read only required files, cache results, and avoid repeated runs unless necessary.
          Language constraint: All development, examples, and implementation details must be provided in Python.

          You are the Chief Executive Officer.
          You are part of a collaborative team where each member has a specific role.

          Your responsibilities:
          1) Extract and preserve the user's requirements.
          2) Produce a concise Requirements Summary.
          3) Add only high-level implementation guidance that helps the CTO and Programmer.
          4) Do not repeat the original task verbatim unless a requirement is ambiguous.
          5) Do not invent unsupported features.
          6) Do not ask for approval.
          7) End your message with the exact token `<INFO> Finished`.

          Output format:

          Requirements Summary:
          - [requirement 1]
          - [requirement 2]
          - [requirement 3]
                  ...

          CEO Guidance:
          - [brief product/quality guidance]
          - [important constraints]
          - [success criteria]

          <INFO> Finished
        base_url: ${BASE_URL}
        api_key: ${API_KEY}
        params: {}
        tooling:
          - type: function
            config:
              tools:
                - name: describe_available_files
                - name: read_file_segment
                - name: search_in_files
                - name: list_directory
              timeout: null
        thinking: null
        memories: []
        retry: null

    - id: Chief Technology Officer
      type: agent
      description: Defines architecture, tech stack, and file structure from CEO plan.
      context_window: -1
      config:
        name: google/gemini-3.1-flash-lite-preview
        provider: openrouter
        role: |-
          ${COMMON_PROMPT}
          Tooling guidance: Minimize external tool calls—batch `describe_available_files` and `read_file_segment`, read only required files, cache results, and avoid repeated runs unless necessary.
          Language constraint: All development, examples, and implementation details must be provided in Python.
          
          You are the Chief Technology Officer.
          You are part of a collaborative team where each member has a specific role.

          Your responsibilities:
          1) Read the CEO output and preserve its requirements internally.
          2) Do NOT repeat the Original Requirements or Requirements Summary unless needed to resolve ambiguity.
          3) Produce only the technical implementation plan needed by the Programmer.
          4) Add concrete architecture, modules, APIs, data structures, algorithms, error handling, tests, and deployment notes.
          5) Do not change, remove, or contradict the CEO's requirements.
          6) End your message with the exact token `<INFO> Finished`.

          Output format:
          Technical Plan:
          - Framework:
          - Modules:
          - Data Model:
          - API/CLI Interface:
          - Core Algorithms:
          - Error Handling & Logging:
          - Testing Plan:
          - Deployment/Run Instructions:

          `<INFO> Finished`

        base_url: ${BASE_URL}
        api_key: ${API_KEY}
        params: {}
        tooling:
          - type: function
            config:
              tools:
                - name: describe_available_files
                - name: read_file_segment
                - name: search_in_files
                - name: list_directory
              timeout: null
        thinking: null
        memories: []
        retry: null

    - id: Programmer
      type: agent
      description: Implements code per CTO specs with communicative dehallucination protocol.
      context_window: -1
      config:
        name: google/gemini-3.1-flash-lite-preview
        provider: openrouter
        role: |-
          ${COMMON_PROMPT}
          Tooling guidance: Minimize external tool calls—batch `describe_available_files` and `read_file_segment`, read only required files, cache results, and avoid repeated runs unless necessary.
          Language constraint: All development, examples, and implementation details must be provided in Python.
          You are the Programmer.
          You are part of a collaborative team where each member has a specific role.

          Your responsibilities:
          1) Implement code based on CTO technical specifications and architecture.
          2) Create files, folders, and project structure as specified by the CTO.
          3) Resolve defects reported by the Code Reviewer (follow the communicative dehallucination protocol below).
          4) Fix test failures reported by the Tester.
          5) Save all file changes using available functions.
          6) Ensure all code is complete, functional, and executable (no placeholders such as pass).

          Communicative dehallucination protocol (MANDATORY when receiving a review comment):
          STEP 1 — Clarify before acting:
            Before writing or changing any code, ask the Code Reviewer one or more targeted
            clarifying questions. Do NOT guess. Do NOT assume. Do NOT start coding yet.
          STEP 2 — Act once clarified:
            Only after receiving specific answers should you load source code, apply the fix,
            save changes, and include "<INFO> Finished".

          Output rules:
          - If asking clarifying questions (Step 1): write ONLY your questions. No code changes.
          - If applying a fix (Step 2): describe what you changed and include "<INFO> Finished".
          - If all work is complete: include "<INFO> Finished".
        base_url: ${BASE_URL}
        api_key: ${API_KEY}
        params: {}
        tooling:
          - type: function
            config:
              tools:
                - name: uv_related:All
                - name: apply_text_edits
                - name: create_folder
                - name: describe_available_files
                - name: delete_path
                - name: read_file_segment
                - name: search_in_files
                - name: save_file
                - name: list_directory
              timeout: null
        thinking: null
        memories: []
        retry: null

    - id: Code Reviewer
      type: agent
      description: Reviews implementation and answers Programmer clarifying questions with specific details.
      context_window: -1
      config:
        name: google/gemini-3.1-flash-lite-preview
        provider: openrouter
        role: |-
          Tooling guidance: Minimize external tool calls—batch `describe_available_files` and `read_file_segment`, read only required files, cache results, and avoid repeated runs unless necessary.
          Language constraint: All development, examples, and implementation details must be provided in Python.
          You are the Code Reviewer.
          You are part of a collaborative team where each member has a specific role.

          IMPORTANT: You MUST call `describe_available_files` yourself and then `read_file_segment` to load
          the actual source code before doing any review. Do NOT ask or instruct the Programmer or any
          other agent to list or read files for you; perform these tool calls directly. If you cannot find any
          files, output "<INFO> Finished".

          Your responsibilities:
          1) Call `describe_available_files` exactly once to list files in the workspace and decide which files to inspect.
          2) Call `read_file_segment` only for the files you will review; batch reads where possible and cache results.
          3) Review the actual code against the specifications, identifying and counting issues by severity:
          

              Critical:
              - Infinite loops or deadlocks
              - Code that crashes at runtime
              - Missing imports or unresolved references
              - Required functions left unimplemented

              High:
              - Logic bugs that produce incorrect outputs
              - Bad assumptions that break common valid inputs

              Medium:
              - Weak error handling
              - Poor edge-case handling
              - Fragile file paths or hardcoded values

              Low:
              - Style, readability, duplication, minor maintainability issues

          4) Report findings in severity order: Critical first, then High, then Medium, then Low.
          5) Provide clear, specific, and actionable feedback — precise enough that the Programmer does not need to guess what to fix.

          Communicative dehallucination protocol (MANDATORY):
          The Programmer will ask clarifying questions before acting. Answer with concrete,
          unambiguous details. Vague answers cause coding hallucinations.
          After answering, end with "<INFO> Problem Found" to keep the fix loop active.
          Critical constraints:
          - You DO NOT modify code yourself.
          - You DO NOT create or delete files.
          - Only report issues you can point to in the actual loaded source code.

          Output rules:
          - If reporting new problems: Report the number of issues found by severity, using the format:
            "X Critical issues were found. Y High issues were found. Z Medium issues were found. W Low issues were found."
            Then provide a numbered list of issues grouped by severity:
            1) [Critical] ...
              Suggested fix: ...
            2) [Critical] ...
              Suggested fix: ...
            3) [High] ...
              Suggested fix: ...
            4) [Medium] ...
              Suggested fix: ...
            5) [Low] ...
              Suggested fix: ...
            End with "<INFO> Problem Found".       

          - If answering the Programmer's clarifying questions: specific answers; end with "<INFO> Problem Found".
          - If no relevant problems remain: output exactly "<INFO> Finished".
        base_url: ${BASE_URL}
        api_key: ${API_KEY}
        params: {}
        tooling:
          - type: function
            config:
              tools:
                - name: describe_available_files
                - name: read_file_segment
                - name: search_in_files
                - name: list_directory
              timeout: null
        thinking: null
        memories: []
        retry: null

    - id: Tester
      type: agent
      description: Creates tests and runs them; reports failures or completion.
      context_window: -1
      config:
        name: google/gemini-3.1-flash-lite-preview
        provider: openrouter
        role: |-
          ${COMMON_PROMPT}
          Tooling guidance: Minimize external tool calls—attempt to infer structure from a single `describe_available_files` call and batch `read_file_segment` calls; prefer lightweight import/compile checks before heavier runs.
          Language constraint: All development, examples, and implementation details must be provided in Python.
          You are the Tester.
          You are part of a collaborative team where each member has a specific role.

          IMPORTANT: You MUST call describe_available_files and read_file_segment to load
          the actual source code before testing. Do NOT report results without first
          reading the code and attempting to build/run it. If you cannot find any
          files, output "<INFO> Finished".

          Primary responsibilities (priority order):
          1) Verify the project builds/installs dependencies and compiles (or can be imported).
          2) Attempt minimal smoke runs of the project's entrypoints (start main scripts or servers) with short timeouts to confirm the program starts without crashing and emits startup logs.
          3) Run the existing test suite if present; otherwise run lightweight compile/import and smoke tests.
          4) Collect and report stdout, stderr, exit codes, and whether startup logs indicate successful start.
          5) If tests or runs fail, identify failing cases and provide reproduction steps and likely root causes and Output ashort error description: "Tool X failed because ...".
              Then end with "<INFO> Problem Found". This ensures the loop continues and the problem is reported.

          Important timeout guidance:
          - Always pass `timeout_seconds` to `uv_run`; use a short timeout for smoke runs of servers, GUIs, games, or any program expected to keep running.
          - If a program times out but shows clear startup logs (e.g., "Listening on port", "Game started"), treat it as a successful startup and do NOT classify as a failure.
          - Only classify a timeout as a bug if the program was supposed to complete quickly or produced no useful output/errors before timing out.

          Critical constraints:
          - You DO NOT modify code yourself.
          - You only identify and report build/compile/run and test failures based on actual attempts.
          - You MUST NOT call any other tool not explicitly listed in your tooling configuration. Use only uv_run for executing commands

          Output rules:
          - If problems exist: report them in a short bullet list (1-4 items) with a brief explanation; end with "<INFO> Problem Found".
          - If nothing more to test or no problems: output a short summary (2-4 bullets) of what was tested and results followed by "<INFO> Finished".
        base_url: ${BASE_URL}
        api_key: ${API_KEY}
        params: {}
        tooling:
          - type: function
            config:
              tools:
                - name: uv_related:All
                - name: apply_text_edits
                - name: create_folder
                - name: describe_available_files
                - name: delete_path
                - name: read_file_segment
                - name: search_in_files
                - name: save_file
                - name: list_directory
              timeout: null
        thinking: null
        memories: []
        retry: null


    - id: FINAL
      type: passthrough
      description: Terminal node when testing confirms completion.
      context_window: 0
      config: {}

    - id: Review Loop Counter
      type: loop_counter
      config:
        max_iterations: 3
        reset_on_emit: true
        message: ''
      description: ''
      context_window: 0
      log_output: true

    - id: Test Loop Counter
      type: loop_counter
      config:
        max_iterations: 2
        reset_on_emit: true
        message: ''
      description: ''
      context_window: 0
      log_output: true

  edges:
    - from: Client Liaison
      to: User Simulator
      trigger: true
      condition:
        type: keyword
        config:
          any: []
          none:
            - <INFO>
          regex: []
          case_sensitive: true
      carry_data: true
      keep_message: false
      process: null

    - from: User Simulator
      to: Client Liaison
      trigger: true
      condition:
        type: keyword
        config:
          any:
            - <INFO> Answered
          none: []
          regex: []
          case_sensitive: true
      carry_data: true
      keep_message: false
      process: null

    - from: Client Liaison
      to: USER
      trigger: true
      condition:
        type: keyword
        config:
          any:
            - <INFO>
          none: []
          regex: []
          case_sensitive: true
      carry_data: true
      keep_message: false
      process: null

    - from: USER
      to: Chief Executive Officer
      trigger: true
      condition: 'true'
      carry_data: true
      keep_message: true
      clear_context: false
      clear_kept_context: false
      process: null

    - from: Chief Executive Officer
      to: Chief Technology Officer
      trigger: true
      condition: 'true'
      carry_data: true
      keep_message: false
      clear_context: false
      clear_kept_context: false
      process: null

    - from: Chief Technology Officer
      to: Programmer
      trigger: true
      condition: 'true'
      carry_data: true
      keep_message: false
      clear_context: false
      clear_kept_context: false
      process: null

    - from: Programmer
      to: Code Reviewer
      trigger: true
      condition: 'true'
      carry_data: true
      keep_message: false
      clear_context: false
      clear_kept_context: false
      process: null

    - from: Code Reviewer
      to: Programmer
      trigger: true
      condition:
        type: keyword
        config:
          any:
            - <INFO> Problem Found
          none: []
          regex: []
          case_sensitive: true
      carry_data: true
      keep_message: false
      clear_context: false
      clear_kept_context: false
      process: null

    # Review loop counter
    - from: Code Reviewer
      to: Review Loop Counter
      trigger: true
      condition:
        type: keyword
        config:
          any: []
          none:
            - <INFO> Finished
          regex: []
          case_sensitive: true
      carry_data: true
      keep_message: false
      clear_context: false
      clear_kept_context: false
      process: null

    - from: Review Loop Counter
      to: Tester
      trigger: true
      condition:
        type: function
        config:
          name: 'true'
      carry_data: true
      keep_message: false
      clear_context: false
      clear_kept_context: false
      process: null

    # Review done → Tester
    - from: Code Reviewer
      to: Tester
      trigger: true
      condition:
        type: keyword
        config:
          any:
            - <INFO> Finished
          none: []
          regex: []
          case_sensitive: true
      carry_data: true
      keep_message: false
      clear_context: false
      clear_kept_context: false
      process: null

    # Test loop
    - from: Tester
      to: Programmer
      trigger: true
      condition:
        type: keyword
        config:
          any: []
          none:
            - <INFO> Finished
          regex: []
          case_sensitive: true
      carry_data: true
      keep_message: false
      clear_context: false
      clear_kept_context: false
      process: null

    - from: Tester
      to: Test Loop Counter
      trigger: true
      condition:
        type: keyword
        config:
          any: []
          none:
            - <INFO> Finished
          regex: []
          case_sensitive: true
      carry_data: true
      keep_message: false
      clear_context: false
      clear_kept_context: false
      process: null

    # Keep Test Loop Counter inside the Programmer/Reviewer/Tester cycle.
    # Without this static back-edge, the scheduler treats Tester -> Test Loop Counter
    # as an external-node trigger and exits the cycle before Tester -> Programmer runs.
    # The condition is intentionally impossible, so this edge never carries data.
    - from: Test Loop Counter
      to: Programmer
      trigger: true
      condition:
        type: keyword
        config:
          any:
            - __NEVER_ROUTE_TEST_COUNTER_TO_PROGRAMMER__
          none: []
          regex: []
          case_sensitive: true
      carry_data: true
      keep_message: false
      clear_context: false
      clear_kept_context: false
      process: null

    # When the test retry limit is reached, the loop counter emits and the run ends.
    - from: Test Loop Counter
      to: FINAL
      trigger: true
      condition:
        type: function
        config:
          name: 'true'
      carry_data: true
      keep_message: false
      clear_context: false
      clear_kept_context: false
      process: null

    - from: Tester
      to: FINAL
      trigger: true
      condition:
        type: keyword
        config:
          any:
            - <INFO> Finished
          none: []
          regex: []
          case_sensitive: true
      carry_data: true
      keep_message: false
      clear_context: false
      clear_kept_context: false
      process: null

  memory: []
  initial_instruction: ''
  start:
    - Client Liaison
  end:
    - FINAL

vars:
  COMMON_PROMPT: >
    ChatDev is a software company powered by multiple intelligent agents, such as chief executive
    officer, chief human resources officer, chief product officer, chief technology officer, etc,
    with a multi-agent organizational structure and the mission of "changing the digital world
    through programming".

  # ════════════════════════════════════════════════════════════════════════════
  # BENCHMARK SELECTOR
  # Change the value below to switch benchmarks. Options:
  #   ${benchmark_task_api}
  #   ${benchmark_csv_pipeline}
  #   ${benchmark_chat_server}
  #   ${benchmark_url_shortener}
  #   ${benchmark_expense_tracker}
  # ════════════════════════════════════════════════════════════════════════════
  BENCHMARK_SPEC: ${benchmark_task_api}


  # ── Benchmark 1: Task Management API ─────────────────────────────────────
  # GROUND TRUTH
  # required_requirements:
  #   R1: Tasks persist between restarts (SQLite DB)
  #   R2: Auth required before accessing tasks (JWT middleware)
  #   R3: Task ownership — users see only their own tasks (user_id filter)
  #   R4: Soft delete — tasks hidden not dropped (is_deleted / deleted_at column)
  #   R5: Pagination on list endpoint (skip/limit or page params)
  # auto_checks:
  #   AC1: Project runs without crashing
  #   AC2: FastAPI used (grep 'from fastapi')
  #   AC3: SQLite used (grep 'sqlite')
  #   AC4: JWT auth implemented (grep 'jwt|bearer|jose')
  #   AC5: Soft delete — no hard DELETE in ORM (grep 'is_deleted|deleted_at')
  #   AC6: Pagination params present (grep 'skip|limit|page' in routes)
  #   AC7: Dockerfile present at project root
  #   AC8: Test suite present and runnable (pytest exits 0)
  #   AC9: User isolation — tasks filtered by user (grep 'user_id|owner_id')
  # llm_judge_criteria:
  #   LJ1 [high]:   Auth flow correct — token issued on login, verified on protected routes
  #   LJ2 [high]:   Soft delete semantically correct — deleted tasks excluded from listing
  #   LJ3 [medium]: Error handling — 401/404/400 returned appropriately
  #   LJ4 [medium]: Code structure — routes, models, auth in separate modules
  #   LJ5 [medium]: JWT secret read from env var, not hardcoded
  # scoring: auto_checks 60% / llm_judge 40%
  # pass condition: auto_check >= 0.7 AND all high-weight LJ pass
  benchmark_task_api: |-
    Project: Task Management REST API

    Product requirements (the client knows these well):
    - Tasks must persist between application restarts.
    - Users must log in before accessing or modifying their tasks.
    - Each user can only see and manage their own tasks.
    - Deleted tasks should not be permanently removed — they should be recoverable.
    - The API must support listing tasks with pagination.

    Technical constraints (the client may not know the exact terms):
    - Framework: FastAPI
    - Database: SQLite
    - Authentication mechanism: JWT tokens
    - Containerisation: Docker (Dockerfile required)
    - Tests: a test suite is required

    Client persona notes:
    - Knows what the system should DO, but not necessarily HOW to implement it.
    - If asked "which framework?", say "whatever is standard for Python APIs."
    - If asked "which database?", say "SQLite is fine, keep it simple."
    - If asked "how should auth work?", say "users should log in with a token."
    - If asked "what happens to deleted tasks?", say "they should be hidden but recoverable."
    - If asked about pagination, say "yes, I don't want thousands of tasks returned at once."


  # ── Benchmark 2: CSV Processing Pipeline ──────────────────────────────────
  # GROUND TRUTH
  # required_requirements:
  #   R1: Streaming/chunked reading — file never fully loaded into memory
  #   R2: Malformed rows skipped and logged, not crashing
  #   R3: Output in JSON format
  #   R4: CLI interface with arguments (argparse or equivalent)
  #   R5: Parallel processing for performance
  # auto_checks:
  #   AC1: Pipeline runs on a small valid CSV without crashing (exit 0)
  #   AC2: Output is valid JSON (python -c "import json; json.load(...)" exits 0)
  #   AC3: Streaming used — no bare pd.read_csv without chunksize on main path
  #   AC4: Malformed row handling — inject bad row, pipeline exits 0, log has skip entry
  #   AC5: Parallel processing present (grep 'ProcessPoolExecutor|ThreadPoolExecutor|Pool')
  #   AC6: CLI arguments accepted (--help exits 0 and shows usage)
  #   AC7: Logging to file or stderr (grep 'logging.|logger.' in source)
  # llm_judge_criteria:
  #   LJ1 [high]:   Streaming is genuinely memory-safe — no full in-memory accumulation
  #   LJ2 [high]:   Error handling granular — each row independent, one bad row never kills pipeline
  #   LJ3 [high]:   Parallel impl correct — no race conditions on shared output, results merged safely
  #   LJ4 [medium]: CLI ergonomic — --input, --output, optional --workers, --help works
  #   LJ5 [medium]: Log informative — includes row number and reason for each skipped row
  # scoring: auto_checks 60% / llm_judge 40%
  # pass condition: AC1+AC2+AC4 pass (functional) AND AC3 passes (no full-load). LJ1-LJ3 all high.
  benchmark_csv_pipeline: |-
    Project: CSV Processing Pipeline

    Product requirements (the client knows these well):
    - The pipeline processes CSV files that may be very large (will not fit in memory).
    - Malformed or invalid rows should be skipped and logged, not crash the process.
    - Output must be in JSON format.
    - The tool must be usable from the command line with arguments.
    - Processing should be as fast as possible for large files.

    Technical constraints (the client may not know the exact terms):
    - Streaming/chunked reading required (no full file load into memory).
    - Parallel processing required for performance.
    - Logging to file or stderr required.
    - CLI interface required (argparse or equivalent).

    Client persona notes:
    - If asked about file size: "Some files can be very large, gigabytes possibly."
    - If asked about errors: "Just skip bad rows and write a log somewhere."
    - If asked about output: "JSON, one record per line is fine."
    - If asked about interface: "I want to run it from the terminal with arguments."
    - If asked about speed: "It needs to handle big files fast, so yes optimise it."


