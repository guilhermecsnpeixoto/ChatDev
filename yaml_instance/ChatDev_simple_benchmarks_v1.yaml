  # ── Benchmark 4: URL Shortener Service ────────────────────────────────────
  # GROUND TRUTH
  # required_requirements:
  #   R1: Long URL → short code creation and redirect (POST /shorten + GET /{code})
  #   R2: Custom slug support (optional custom_code param)
  #   R3: Expiry date on links (expires_at field; 410 Gone after expiry)
  #   R4: Click counter per link (click_count incremented on each redirect)
  #   R5: Rate limiting per API key (429 on excess; max 100 req/min)
  # auto_checks:
  #   AC1: docker-compose up starts all services without error
  #   AC2: POST /shorten creates a short link (response contains short_code)
  #   AC3: GET /{code} redirects to original URL (HTTP 301 or 302)
  #   AC4: Custom slug accepted (POST with custom_code; GET /custom redirects correctly)
  #   AC5: Expired link returns 410 (create link with past expiry; verify HTTP 410)
  #   AC6: Click counter increments (GET 3 times; stats show count=3)
  #   AC7: Rate limit enforced (101 rapid requests; 102nd returns HTTP 429)
  #   AC8: PostgreSQL used — not SQLite (grep 'postgresql|psycopg'; no sqlite in DB config)
  #   AC9: Redis used for caching (grep 'redis|Redis'; cache lookup before DB on redirect)
  # llm_judge_criteria:
  #   LJ1 [high]:   Redirect hits Redis cache first, falls back to PostgreSQL — not DB-first
  #   LJ2 [high]:   Expiry check uses UTC timestamps — not naive datetime
  #   LJ3 [high]:   Rate limiting per API key using Redis counter with TTL
  #   LJ4 [medium]: Collision handling for random short codes — retry if code already exists
  #   LJ5 [medium]: Docker Compose defines dependencies and health checks correctly
  # scoring: auto_checks 60% / llm_judge 40%
  # pass condition: AC1 (compose up) + AC2 + AC3 (basic flow). AC5+AC7 are discriminating. All LJ high must pass.
  benchmark_url_shortener: |-
    Project: URL Shortener Service

    Product requirements (the client knows these well):
    - Users can submit a long URL and receive a short link.
    - Short links must redirect to the original URL.
    - Users should be able to choose a custom short code (e.g. /my-link).
    - Short links can have an optional expiry date — after which they stop working.
    - Each click on a short link should be counted so usage can be tracked.
    - The service must handle many users at once without slowing down.

    Technical constraints (the client may not know the exact terms):
    - Database: PostgreSQL
    - Caching: Redis (for fast redirect lookups)
    - Authentication: API key per user
    - Containerisation: Docker Compose (app + dependencies)
    - Rate limiting: max 100 requests per minute per API key

    Client persona notes:
    - If asked about storage: "It needs to remember the links even after restart."
    - If asked about custom links: "Yes, I want to be able to pick the short code myself."
    - If asked about expiry: "Yes, some links should stop working after a certain date."
    - If asked about analytics: "Just a click counter per link is enough."
    - If asked about scale: "It should handle many users at once, don't let one user spam it."
    - If asked about auth: "Each user has their own API key to access the service."


  # ── Benchmark 5: Expense Tracker CLI ──────────────────────────────────────
  # GROUND TRUTH
  # required_requirements:
  #   R1: Add, edit, delete expense entries with category
  #   R2: Multi-currency support with base currency conversion
  #   R3: Recurring expenses auto-generated monthly
