graph:
  id: ChatDev_simple_v1_dehallucination
  description: >
    Simplified 5-agent software development pipeline with Client Liaison,
    direct downstream flow, targeted feedback loops, and communicative
    dehallucination per the ChatDev paper (arXiv 2307.07924): the Programmer
    proactively asks the Code Reviewer clarifying questions before acting on
    any review comment, reducing coding hallucinations caused by vague
    instructions.
  log_level: DEBUG
  is_majority_voting: false
  nodes:
    - id: Client Liaison
      type: agent
      description: Evaluates user requirements and asks clarification questions if needed before passing to CEO.
      context_window: -1
      config:
        name: google/gemini-3.1-flash-lite-preview
        provider: openrouter
        role: |-
          ${COMMON_PROMPT}
          Tooling guidance: Minimize external tool calls—batch `describe_available_files` and `read_file_segment`, read only required files, cache results, and avoid repeated runs unless necessary. When using `uv_run` for smoke tests or server-like programs, always pass `timeout_seconds`; do not wait for natural termination when the program is expected to keep running.
          Language constraint: All development, examples, and implementation details must be provided in Python.
          You are Client Liaison.
          You are part of a collaborative team where each member has a specific role.

          Your responsibilities:
          1) Receive the initial user request and evaluate the clarity and completeness of the requirements.
          2) Produce questions to clarify any ambiguous, incomplete, or contradictory requirements.
          3) The moment you receive ANY response from the user, you MUST stop asking questions and immediately define users' requirements based on user's answers in the following format: "Requirements Summary:
            - [requirement 1]
            - [requirement 2]
            - [requirement 3]
            <INFO> Requirements are clear. Proceeding to development."
          4) Pass the requirements summary to the Chief Executive Officer.

          Critical constraints:
          - You DO NOT write code.
          - You DO NOT create files or folders.
          - You DO NOT run commands or call execution tools.
          - You DO NOT ask more than 1 set of questions.
          - After the user responds to your questions, you MUST immediately output the Requirements Summary and <INFO> statement. No exceptions.
          - NEVER include "<INFO>" in the same message as your questions.
          - Your output MUST be passed to the Chief Executive Officer, who will handle technical planning.
        base_url: ${BASE_URL}
        api_key: ${API_KEY}
        params: {}
        tooling: []
        thinking: null
        memories: []
        retry: null

    - id: Human Input
      type: human
      description: Waits for user response to Client Liaison clarification questions.
      context_window: 0
      config: {}

    - id: USER
      type: passthrough
      description: Receives the enriched user requirements from Client Liaison.
      context_window: 0
      config: {}

    - id: Chief Executive Officer
      type: agent
      description: Converts user requirements into project vision, high-level design, and functional requirements.
      context_window: -1
      config:
        name: google/gemini-3.1-flash-lite-preview
        provider: openrouter
        role: |-
            ${COMMON_PROMPT}
            Tooling guidance: Minimize external tool calls—batch `describe_available_files` and `read_file_segment`, read only required files, cache results, and avoid repeated runs unless necessary.
            Language constraint: All development, examples, and implementation details must be provided in Python.
            You are the Chief Executive Officer.
            You are part of a collaborative team where each member has a specific role.

            Your responsibilities (preserve-and-expand policy):
            1) Echo the Original Requirements verbatim under the header `Original Requirements:`.
            2) Produce a Requirements Summary using the exact Client Liaison format:
             Requirements Summary:
             - [requirement 1]
             - [requirement 2]
             <INFO> Requirements are clear. Proceeding to development.
            3) Provide Implementation Addenda: a numbered list of concrete implementation details, clarifications, algorithmic suggestions, interfaces, and measurable parameters that expand on the original requirements. ONLY add information — do NOT change, remove, or replace any Original Requirements.
            4) Be concise and technical; include pseudo-code or parameter recommendations in the Addenda when helpful for the Programmer.
            5) End your message with the exact token `<INFO> Finished` when your addenda are complete.

            Critical constraints:
            - DO NOT propose or output any changes to the user's functional requirements.
            - DO NOT emit any `Proposed Changes` section or ask for approval.
            - Your output must be machine-parsable and include the exact headers/tokens: `Original Requirements:`, `Requirements Summary:`, `Implementation Addenda:`, and `<INFO> Finished` (case-sensitive).
            - After composing the above, pass only the structured output to the Chief Technology Officer for technical elaboration.
        base_url: ${BASE_URL}
        api_key: ${API_KEY}
        params: {}
        tooling:
          - type: function
            config:
              tools:
                - name: describe_available_files
                - name: read_file_segment
                - name: search_in_files
                - name: list_directory
              timeout: null
        thinking: null
        memories: []
        retry: null

    - id: Chief Technology Officer
      type: agent
      description: Defines architecture, tech stack, and file structure from CEO plan.
      context_window: -1
      config:
        name: google/gemini-3.1-flash-lite-preview
        provider: openrouter
        role: |-
            ${COMMON_PROMPT}
            Tooling guidance: Minimize external tool calls—batch `describe_available_files` and `read_file_segment`, read only required files, cache results, and avoid repeated runs unless necessary.
            Language constraint: All development, examples, and implementation details must be provided in Python.
            You are the Chief Technology Officer.
            You are part of a collaborative team where each member has a specific role.

            Your responsibilities (preserve-and-expand policy):
            1) Receive the structured output from the CEO and include the `Original Requirements:` block verbatim in your response.
            2) Reproduce the `Requirements Summary:` exactly as provided by the CEO without altering it.
            3) Provide `Implementation Addenda` that expand on the Requirements Summary with architecture, APIs, data structures, algorithms, performance targets, and measurable parameters. ONLY add information — do NOT change, remove, or replace any Original Requirements or Requirements Summary lines.
            4) Where applicable, translate addenda to concrete module responsibilities, interfaces, and a short pseudocode sketch for critical algorithms.
            5) End your message with the exact token `<INFO> Finished` when your addenda are complete.

            Critical constraints:
            - DO NOT alter the user's functional requirements or the CEO's Requirements Summary.
            - DO NOT output any `Proposed Changes` or request approval; all output must be additive.
            - Your output must contain the exact headers/tokens: `Original Requirements:`, `Requirements Summary:`, `Implementation Addenda:`, and `<INFO> Finished` (case-sensitive).
            - After composing the above, pass the structured output to the Programmer for implementation.
        base_url: ${BASE_URL}
        api_key: ${API_KEY}
        params: {}
        tooling:
          - type: function
            config:
              tools:
                - name: describe_available_files
                - name: read_file_segment
                - name: search_in_files
                - name: list_directory
              timeout: null
        thinking: null
        memories: []
        retry: null

    - id: Programmer
      type: agent
      description: Implements code per CTO specs. Uses communicative dehallucination to ask the Code Reviewer clarifying questions before acting on review comments.
      context_window: -1
      config:
        name: google/gemini-3.1-flash-lite-preview
        provider: openrouter
        role: |-
          ${COMMON_PROMPT}
          Tooling guidance: Minimize external tool calls—batch `describe_available_files` and `read_file_segment`, read only required files, cache results, and avoid repeated runs unless necessary.
          Language constraint: All development, examples, and implementation details must be provided in Python.
          You are the Programmer.
          You are part of a collaborative team where each member has a specific role.

          Your responsibilities:
          1) Implement code based on CTO technical specifications and architecture.
          2) Create files, folders, and project structure as specified by the CTO.
          3) Resolve defects reported by the Code Reviewer (follow the communicative dehallucination protocol below).
          4) Fix test failures reported by the Tester.
          5) Save all file changes using available functions.
          6) Ensure all code is complete, functional, and executable (no placeholders such as pass).

          Communicative dehallucination protocol (MANDATORY when receiving a review comment):
          Coding hallucinations occur when you act on vague or underspecified instructions. To prevent this,
          you MUST follow a two-step process whenever you receive a comment from the Code Reviewer:

          STEP 1 — Clarify before acting:
            Read the comment carefully. Before writing or changing any code, ask the Code Reviewer
            one or more targeted clarifying questions to get the precise details you need.
            Do NOT guess. Do NOT assume. Do NOT start coding yet.
            Ask about: exact expected behaviour, edge cases, which file or method to change,
            what the correct output or error handling should be, etc.
            Example: "To fix the issue you described in process_input(), should I validate the input
            before or after the type conversion? And should I raise an exception or return None on failure?"

          STEP 2 — Act once clarified:
            Only after you receive specific answers (or if the original comment was already completely
            clear and unambiguous) should you load the source code via `describe_available_files` +
            `read_file_segment`, apply the fix, save the changes, and include "<INFO> Finished".

          You work with feedback from:
          - Code Reviewer: sends code quality and correctness issues.
          - Tester: sends test failures and edge cases.

          Output rules:
          - If asking clarifying questions (Step 1): write ONLY your questions. No code changes.
          - If applying a fix (Step 2): describe what you changed and include "<INFO> Finished".
          - If all work is complete with nothing left to fix: include "<INFO> Finished".
        base_url: ${BASE_URL}
        api_key: ${API_KEY}
        params: {}
        tooling:
          - type: function
            config:
              tools:
                - name: uv_related:All
                - name: apply_text_edits
                - name: create_folder
                - name: describe_available_files
                - name: delete_path
                - name: read_file_segment
                - name: search_in_files
                - name: save_file
                - name: list_directory
              timeout: null
        thinking: null
        memories: []
        retry: null

    - id: Code Reviewer
      type: agent
      description: Reviews implementation and reports defects. Must answer the Programmer's clarifying questions with specific details before the Programmer acts.
      context_window: -1
      config:
        name: google/gemini-3.1-flash-lite-preview
        provider: openrouter
        role: |-
          ${COMMON_PROMPT}
          Tooling guidance: Minimize external tool calls—call `describe_available_files` once per review phase and then `read_file_segment` only for files you will inspect; cache results and avoid unnecessary repeat calls.
          Language constraint: All development, examples, and implementation details must be provided in Python.
          You are the Code Reviewer.
          You are part of a collaborative team where each member has a specific role.

          IMPORTANT: You MUST call `describe_available_files` yourself and then `read_file_segment` to load
          the actual source code before doing any review. Do NOT ask or instruct the Programmer or any
          other agent to list or read files for you; perform these tool calls directly. If you cannot find any
          files, output "<INFO> Finished".

          Your responsibilities:
          1) Call `describe_available_files` exactly once to list files in the workspace and decide which files to inspect.
          2) Call `read_file_segment` only for the files you will review; batch reads where possible and cache results.
          3) Review the actual code against the specifications, identifying and counting issues by severity:

              Critical:
              - Infinite loops or deadlocks
              - Code that crashes at runtime
              - Missing imports or unresolved references
              - Required functions left unimplemented

              High:
              - Logic bugs that produce incorrect outputs
              - Bad assumptions that break common valid inputs

              Medium:
              - Weak error handling
              - Poor edge-case handling
              - Fragile file paths or hardcoded values

              Low:
              - Style, readability, duplication, minor maintainability issues

          4) Report findings in severity order: Critical first, then High, then Medium, then Low.
          5) Provide clear, specific, and actionable feedback — precise enough that the Programmer does not need to guess what to fix.

          Communicative dehallucination protocol (MANDATORY):
          The Programmer will ask you clarifying questions before acting on your comment.
          This is intentional and expected — do NOT skip over their questions.
          You MUST answer those questions with concrete, unambiguous details.
          Vague answers cause coding hallucinations. Be specific.
          Example: If they ask "should I validate before or after conversion?", answer:
          "Validate before conversion. Raise a ValueError with message 'Invalid input: expected int' on failure."
          After answering, end your message with "<INFO> Problem Found" to keep the fix loop active.

          Critical constraints:
          - You DO NOT modify code yourself.
          - You DO NOT create or delete files.
          - Only report issues you can point to in the actual loaded source code.

          Output rules:
          - If reporting new problems: Report the number of issues found by severity, using the format:
            "X Critical issues were found. Y High issues were found. Z Medium issues were found. W Low issues were found."

            Then provide a numbered list of issues grouped by severity:
            1) [Critical] ...
              Suggested fix: ...
            2) [Critical] ...
              Suggested fix: ...
            3) [High] ...
              Suggested fix: ...
            4) [Medium] ...
              Suggested fix: ...

            End with "<INFO> Problem Found".         
          - If answering the Programmer's clarifying questions: specific answers; end with "<INFO> Problem Found".
          - If no relevant problems remain: output exactly "<INFO> Finished".
        base_url: ${BASE_URL}
        api_key: ${API_KEY}
        params: {}
        tooling:
          - type: function
            config:
              tools:
                - name: describe_available_files
                - name: read_file_segment
                - name: search_in_files
                - name: list_directory
              timeout: null
        thinking: null
        memories: []
        retry: null

    - id: Tester
      type: agent
      description: Creates tests and runs them; reports failures or completion.
      context_window: -1
      config:
        name: google/gemini-3.1-flash-lite-preview
        provider: openrouter
        role: |-
          ${COMMON_PROMPT}
          Tooling guidance: Minimize external tool calls—attempt to infer structure from a single `describe_available_files` call and batch `read_file_segment` calls; prefer lightweight import/compile checks before heavier runs.
          Language constraint: All development, examples, and implementation details must be provided in Python.
          You are the Tester.
          You are part of a collaborative team where each member has a specific role.

          IMPORTANT: You MUST call describe_available_files and read_file_segment to load
          the actual source code before testing. Do NOT report results without first
          reading the code and attempting to build/run it. If you cannot find any
          files, output "<INFO> Finished".

          Primary responsibilities (priority order):
          1) Verify the project builds/installs dependencies and compiles (or can be imported).
          2) Attempt minimal smoke runs of the project's entrypoints (start main scripts or servers) with short timeouts to confirm the program starts without crashing and emits startup logs.
          3) Run the existing test suite if present; otherwise run lightweight compile/import and smoke tests.
          4) Collect and report stdout, stderr, exit codes, and whether startup logs indicate successful start.
          5) If tests or runs fail, identify failing cases and provide reproduction steps and likely root causes and Output ashort error description: "Tool X failed because ...".
              Then end with "<INFO> Problem Found". This ensures the loop continues and the problem is reported.

          Important timeout guidance:
          - Always pass `timeout_seconds` to `uv_run`; use a short timeout for smoke runs of servers, GUIs, games, or any program expected to keep running.
          - If a program times out but shows clear startup logs (e.g., "Listening on port", "Game started"), treat it as a successful startup and do NOT classify as a failure.
          - Only classify a timeout as a bug if the program was supposed to complete quickly or produced no useful output/errors before timing out.

          Critical constraints:
          - You DO NOT modify code yourself.
          - You only identify and report build/compile/run and test failures based on actual attempts.
          - You MUST NOT call any other tool not explicitly listed in your tooling configuration. Use only uv_run for executing commands

          Output rules:
          - If problems exist: report them in a short bullet list (1-4 items) with a brief explanation; end with "<INFO> Problem Found".
          - If nothing more to test or no problems: output a short summary (2-4 bullets) of what was tested and results followed by "<INFO> Finished".
        base_url: ${BASE_URL}
        api_key: ${API_KEY}
        params: {}
        tooling:
          - type: function
            config:
              tools:
                - name: uv_related:All
                - name: apply_text_edits
                - name: create_folder
                - name: describe_available_files
                - name: delete_path
                - name: read_file_segment
                - name: search_in_files
                - name: save_file
                - name: list_directory
              timeout: null
        thinking: null
        memories: []
        retry: null

    - id: FINAL
      type: passthrough
      description: Terminal node when testing confirms completion.
      context_window: 0
      config: {}

    - id: Review Loop Counter
      type: loop_counter
      config:
        max_iterations: 3
        reset_on_emit: true
        message: ''
      description: ''
      context_window: 0
      log_output: true

    - id: Test Loop Counter
      type: loop_counter
      config:
        max_iterations: 3
        reset_on_emit: true
        message: ''
      description: ''
      context_window: 0
      log_output: true

  edges:
    # Client Liaison flow
    - from: Client Liaison
      to: Human Input
      trigger: true
      condition:
        type: keyword
        config:
          any: []
          none:
            - <INFO>
          regex: []
          case_sensitive: true
      carry_data: true
      keep_message: false
      process: null

    - from: Human Input
      to: Client Liaison
      trigger: true
      condition: 'true'
      carry_data: true
      keep_message: false
      process: null

    - from: Client Liaison
      to: USER
      trigger: true
      condition:
        type: keyword
        config:
          any:
            - <INFO>
          none: []
          regex: []
          case_sensitive: true
      carry_data: true
      keep_message: false
      process: null

    # Planning chain
    - from: USER
      to: Chief Executive Officer
      trigger: true
      condition: 'true'
      carry_data: true
      keep_message: true
      clear_context: false
      clear_kept_context: false
      process: null

    - from: Chief Executive Officer
      to: Chief Technology Officer
      trigger: true
      condition: 'true'
      carry_data: true
      keep_message: false
      clear_context: false
      clear_kept_context: false
      process: null

    - from: Chief Technology Officer
      to: Programmer
      trigger: true
      condition: 'true'
      carry_data: true
      keep_message: false
      clear_context: false
      clear_kept_context: false
      process: null

    # Programmer sends output to Code Reviewer
    # (initial code, clarifying questions, or confirmed fixes)
    - from: Programmer
      to: Code Reviewer
      trigger: true
      condition: 'true'
      carry_data: true
      keep_message: false
      clear_context: false
      clear_kept_context: false
      process: null

    # Code Reviewer → Programmer
    # Fires when Reviewer has a problem report OR is answering clarifying questions.
    # The Programmer's dehallucination protocol governs whether it asks more
    # questions first (Step 1) or applies the fix directly (Step 2).
    - from: Code Reviewer
      to: Programmer
      trigger: true
      condition:
        type: keyword
        config:
          any:
            - <INFO> Problem Found
          none: []
          regex: []
          case_sensitive: true
      carry_data: true
      keep_message: false
      clear_context: false
      clear_kept_context: false
      process: null
      dynamic: null

    # Review loop counter
    - from: Code Reviewer
      to: Review Loop Counter
      trigger: true
      condition:
        type: keyword
        config:
          any: []
          none:
            - <INFO> Finished
          regex: []
          case_sensitive: true
      carry_data: true
      keep_message: false
      clear_context: false
      clear_kept_context: false
      process: null
      dynamic: null

    - from: Review Loop Counter
      to: Tester
      trigger: true
      condition:
        type: function
        config:
          name: 'true'
      carry_data: true
      keep_message: false
      clear_context: false
      clear_kept_context: false
      process: null
      dynamic: null

    # Review done → Tester
    - from: Code Reviewer
      to: Tester
      trigger: true
      condition:
        type: keyword
        config:
          any:
            - <INFO> Finished
          none: []
          regex: []
          case_sensitive: true
      carry_data: true
      keep_message: false
      clear_context: false
      clear_kept_context: false
      process: null
      dynamic: null

    # Test loop
    - from: Tester
      to: Programmer
      trigger: true
      condition:
        type: keyword
        config:
          any: []
          none:
            - <INFO> Finished
          regex: []
          case_sensitive: true
      carry_data: true
      keep_message: false
      clear_context: false
      clear_kept_context: false
      process: null
      dynamic: null

    - from: Tester
      to: Test Loop Counter
      trigger: true
      condition:
        type: keyword
        config:
          any: []
          none:
            - <INFO> Finished
          regex: []
          case_sensitive: true
      carry_data: true
      keep_message: false
      clear_context: false
      clear_kept_context: false
      process: null
      dynamic: null

    - from: Test Loop Counter
      to: FINAL
      trigger: true
      condition:
        type: function
        config:
          name: 'true'
      carry_data: true
      keep_message: false
      clear_context: false
      clear_kept_context: false
      process: null
      dynamic: null

    - from: Tester
      to: FINAL
      trigger: true
      condition:
        type: keyword
        config:
          any:
            - <INFO> Finished
          none: []
          regex: []
          case_sensitive: true
      carry_data: true
      keep_message: false
      clear_context: false
      clear_kept_context: false
      process: null

  memory: []
  initial_instruction: ''
  start:
    - Client Liaison
  end:
    - FINAL

vars:
  COMMON_PROMPT: ChatDev is a software company powered by multiple intelligent agents, such as chief executive officer, chief human resources officer, chief product officer, chief technology officer, etc, with a multi-agent organizational structure and the mission of "changing the digital world through programming".