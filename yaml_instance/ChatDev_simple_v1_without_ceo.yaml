      to: Human Input
      trigger: true
      condition:
        type: keyword
        config:
          any: []
          none:
            - <INFO>
          regex: []
          case_sensitive: true
      carry_data: true
      keep_message: false
      process: null
    - from: Human Input
      to: Client Liaison
      trigger: true
      condition: 'true'
      carry_data: true
      keep_message: false
      process: null
    - from: Client Liaison
      to: USER
      trigger: true
      condition:
        type: keyword
